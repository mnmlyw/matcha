name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Run tests
        run: zig build test

  build:
    name: Build App
    runs-on: macos-15
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build library
        run: zig build

      - name: Build app
        run: zig build app

      - name: Codesign
        run: codesign --deep --force --sign - zig-out/Matcha.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Matcha.app
          path: zig-out/Matcha.app
